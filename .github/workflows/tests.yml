name: Run Tests & Update Results

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci3_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, pgsql, redis, curl, mbstring, xml, zip
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      # ── Run unit/library tests (no server needed) ──
      - name: Run Unit & Library Tests
        run: |
          mkdir -p tests/results
          vendor/bin/phpunit --testsuite "Unit Tests" --testsuite "Library Tests" --log-junit tests/results/junit-unit.xml 2>&1 | tee tests/results/unit-output.txt
        continue-on-error: true

      # ── Start Apache + PHP for API tests ──
      - name: Setup Apache for API Tests
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq apache2 libapache2-mod-php8.3 > /dev/null 2>&1
          sudo a2enmod rewrite php8.3 headers
          sudo tee /etc/apache2/sites-available/ci3.conf > /dev/null <<EOF
          <VirtualHost *:80>
              DocumentRoot ${{ github.workspace }}
              <Directory ${{ github.workspace }}>
                  AllowOverride All
                  Require all granted
              </Directory>
          </VirtualHost>
          EOF
          sudo a2dissite 000-default.conf
          sudo a2ensite ci3.conf
          sudo systemctl restart apache2
          # Wait for Apache
          sleep 2
          curl -s http://localhost/ > /dev/null 2>&1 || true

      - name: Run API Tests
        env:
          API_BASE_URL: http://localhost
        run: |
          vendor/bin/phpunit --testsuite "API Tests" --log-junit tests/results/junit-api.xml 2>&1 | tee tests/results/api-output.txt
        continue-on-error: true

      # ── Generate automated_tests.md ──
      - name: Generate Test Results Markdown
        run: |
          php tests/generate_results.php > automated_tests.md

      - name: Commit Test Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automated_tests.md
          git diff --cached --quiet || git commit -m "docs: update automated test results [skip ci]"
          git push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
