name: Run Tests and Update Results

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, mbstring, xml, zip
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      # -- Unit Tests: framework structure, PHP syntax --
      - name: Run Unit Tests
        run: |
          mkdir -p tests/results
          vendor/bin/phpunit --testsuite "Unit Tests" --log-junit tests/results/junit-unit.xml 2>&1 | tee tests/results/unit-output.txt
        continue-on-error: true

      # -- Library Tests: JWT, etc. (no server needed) --
      - name: Run Library Tests
        run: |
          vendor/bin/phpunit --testsuite "Library Tests" --log-junit tests/results/junit-lib.xml 2>&1 | tee tests/results/lib-output.txt
        continue-on-error: true

      # -- Generate automated_tests.md from JUnit XML --
      - name: Generate Test Results Markdown
        run: php tests/generate_results.php > automated_tests.md

      - name: Commit Test Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automated_tests.md
          git diff --cached --quiet || git commit -m "docs: update automated test results [skip ci]"
          git push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
